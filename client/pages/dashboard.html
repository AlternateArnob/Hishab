<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Hishab ERP</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">H</div>
      <div>
        <div class="logo-text">Hishab</div>
        <div class="logo-sub">ERP Platform</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item active" href="dashboard.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <div class="nav-section-label">Modules</div>
      <a class="nav-item" href="crm.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        CRM
      </a>
      <a class="nav-item" href="sales.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Sales
      </a>
      <a class="nav-item" href="inventory.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        Inventory
      </a>
      <a class="nav-item" href="accounting.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Accounting
      </a>
      <a class="nav-item" href="analytics.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/><polyline points="2 20 22 20"/>
        </svg>
        Analytics
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="logout()">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-user-name">Admin</div>
          <div class="user-role" id="sidebar-user-role">admin</div>
        </div>
        <svg width="14" height="14" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" viewBox="0 0 24 24" style="margin-left:auto;flex-shrink:0">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Topbar -->
  <header class="topbar">
    <button class="hamburger" id="hamburger" onclick="openSidebar()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div>
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-breadcrumb">Overview of your business</div>
    </div>
    <div class="topbar-actions">
      <span class="text-sm text-3" id="topbar-date"></span>
    </div>
  </header>

  <!-- Main content -->
  <main class="main-content">

    <!-- KPI cards -->
    <div class="kpi-grid" id="kpi-grid">
      <!-- filled by JS -->
      <div class="kpi-card"><div class="spinner"></div></div>
      <div class="kpi-card"><div class="spinner"></div></div>
      <div class="kpi-card"><div class="spinner"></div></div>
      <div class="kpi-card"><div class="spinner"></div></div>
      <div class="kpi-card"><div class="spinner"></div></div>
      <div class="kpi-card"><div class="spinner"></div></div>
    </div>

    <!-- Charts grid -->
    <div class="dashboard-grid">

      <!-- Revenue chart -->
      <div class="card">
        <div class="card-header">
          <h3>Revenue — Last 30 Days</h3>
        </div>
        <div class="card-body">
          <div class="chart-container">
            <canvas id="revenue-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- Top products -->
      <div class="card">
        <div class="card-header">
          <h3>Top Selling Products</h3>
        </div>
        <div class="card-body" id="top-products">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Monthly revenue -->
      <div class="card">
        <div class="card-header">
          <h3>Monthly Revenue — Last 6 Months</h3>
        </div>
        <div class="card-body">
          <div class="chart-container">
            <canvas id="monthly-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- Customer growth -->
      <div class="card">
        <div class="card-header">
          <h3>New Customers — Last 6 Months</h3>
        </div>
        <div class="card-body">
          <div class="chart-container">
            <canvas id="customer-chart"></canvas>
          </div>
        </div>
      </div>

    </div>

  </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
requireAuth();
populateSidebarUser();

// Date in topbar
document.getElementById('topbar-date').textContent =
  new Date().toLocaleDateString('en-BD', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// Sidebar mobile
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

// Chart defaults
Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size   = 12;
Chart.defaults.color       = '#94A3B8';

const chartOpts = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { display: false }, border: { display: false } },
    y: { grid: { color: '#F1F5F9' }, border: { display: false },
         ticks: { callback: v => '৳' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v) } }
  }
};

let revenueChart, monthlyChart, customerChart;

async function loadDashboard() {
  try {
    const { data } = await api.analytics.dashboard();
    renderKPIs(data.kpi);
    renderRevenueChart(data.revenueByDay);
    renderMonthlyChart(data.revenueByMonth);
    renderCustomerChart(data.customerGrowth);
    renderTopProducts(data.topProducts);
  } catch (err) {
    toast('Failed to load dashboard data', 'error');
  }
}

function renderKPIs(kpi) {
  const grid = document.getElementById('kpi-grid');
  const items = [
    { label: 'Revenue This Month', value: formatCurrency(kpi.revenue_this_month || 0),
      icon: '৳', color: '#EFF6FF', iconColor: '#2563EB' },
    { label: 'Active Customers',  value: kpi.active_customers || 0,
      icon: '👥', color: '#F0FDF4', iconColor: '#16A34A' },
    { label: 'Open Orders',       value: kpi.open_orders || 0,
      icon: '📋', color: '#FFFBEB', iconColor: '#D97706' },
    { label: 'Outstanding',       value: formatCurrency(kpi.outstanding_receivable || 0),
      icon: '⏳', color: '#FEF2F2', iconColor: '#DC2626' },
    { label: 'Expenses This Month', value: formatCurrency(kpi.expenses_this_month || 0),
      icon: '💸', color: '#F5F3FF', iconColor: '#7C3AED' },
    { label: 'Low Stock Alerts',  value: kpi.low_stock_alerts || 0,
      icon: '⚠️', color: '#FFF7ED', iconColor: '#EA580C' },
  ];
  grid.innerHTML = items.map(i => `
    <div class="kpi-card">
      <div class="kpi-icon" style="background:${i.color}; font-size:1.1rem">${i.icon}</div>
      <div class="kpi-label">${i.label}</div>
      <div class="kpi-value">${i.value}</div>
    </div>`).join('');
}

function renderRevenueChart(data) {
  if (!data?.length) return;
  const ctx = document.getElementById('revenue-chart').getContext('2d');
  if (revenueChart) revenueChart.destroy();
  revenueChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => new Date(d.date).toLocaleDateString('en', { month:'short', day:'numeric' })),
      datasets: [{
        data: data.map(d => d.revenue),
        borderColor: '#2563EB', backgroundColor: 'rgba(37,99,235,.08)',
        borderWidth: 2, fill: true, tension: .4, pointRadius: 3,
        pointBackgroundColor: '#2563EB',
      }]
    },
    options: { ...chartOpts }
  });
}

function renderMonthlyChart(data) {
  if (!data?.length) return;
  const ctx = document.getElementById('monthly-chart').getContext('2d');
  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.month),
      datasets: [{
        data: data.map(d => d.revenue),
        backgroundColor: '#2563EB', borderRadius: 6, borderSkipped: false,
      }]
    },
    options: { ...chartOpts }
  });
}

function renderCustomerChart(data) {
  if (!data?.length) return;
  const ctx = document.getElementById('customer-chart').getContext('2d');
  if (customerChart) customerChart.destroy();
  customerChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.month),
      datasets: [{
        data: data.map(d => d.new_customers),
        backgroundColor: '#16A34A', borderRadius: 6, borderSkipped: false,
      }]
    },
    options: {
      ...chartOpts,
      scales: {
        ...chartOpts.scales,
        y: { ...chartOpts.scales.y, ticks: { callback: v => v } }
      }
    }
  });
}

function renderTopProducts(data) {
  const el = document.getElementById('top-products');
  if (!data?.length) {
    el.innerHTML = `<div class="empty-state"><p>No sales data yet</p></div>`;
    return;
  }
  el.innerHTML = data.map((p, i) => `
    <div style="display:flex;align-items:center;gap:.75rem;padding:.65rem 0;${i < data.length-1 ? 'border-bottom:1px solid var(--border)' : ''}">
      <div style="width:28px;height:28px;border-radius:var(--radius-sm);background:var(--brand-light);
           display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--brand);flex-shrink:0">
        ${i+1}
      </div>
      <div style="flex:1;min-width:0">
        <div class="font-500 truncate" style="font-size:.875rem">${p.name}</div>
        <div class="text-xs text-3">${p.sku} · ${p.total_sold} sold</div>
      </div>
      <div class="font-600" style="font-size:.875rem">${formatCurrency(p.total_revenue)}</div>
    </div>`).join('');
}

loadDashboard();
</script>
</body>
</html>
