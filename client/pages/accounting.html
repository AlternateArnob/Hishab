<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting — Hishab ERP</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">H</div>
      <div><div class="logo-text">Hishab</div><div class="logo-sub">ERP Platform</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="dashboard.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <div class="nav-section-label">Modules</div>
      <a class="nav-item" href="crm.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        CRM
      </a>
      <a class="nav-item" href="sales.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Sales
      </a>
      <a class="nav-item" href="inventory.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Inventory
      </a>
      <a class="nav-item active" href="accounting.html" data-role="admin,manager">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Accounting
      </a>
      <a class="nav-item" href="analytics.html" data-role="admin,manager">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><polyline points="2 20 22 20"/></svg>
        Analytics
      </a>
          <div class="nav-section-label" data-role="admin,manager">Admin</div>
      <a class="nav-item" href="users.html" data-role="admin,manager">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
        Users
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="logout()">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-user-name">Admin</div>
          <div class="user-role" id="sidebar-user-role">admin</div>
        </div>
        <svg width="14" height="14" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" viewBox="0 0 24 24" style="margin-left:auto;flex-shrink:0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Topbar -->
  <header class="topbar">
    <button class="hamburger" onclick="openSidebar()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div>
      <div class="topbar-title">Accounting</div>
      <div class="topbar-breadcrumb">Transactions &amp; Accounts</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" data-role="admin,manager" onclick="openTxModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Transaction
      </button>
    </div>
  </header>

  <main class="main-content">

    <!-- Summary cards -->
    <div class="stat-grid" id="acct-summary">
      <div class="stat-card"><div class="spinner"></div></div>
      <div class="stat-card"><div class="spinner"></div></div>
      <div class="stat-card"><div class="spinner"></div></div>
    </div>

    <!-- Income vs Expense chart + date filter -->
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header">
        <h3>Income vs Expenses</h3>
        <div class="flex gap-2 items-center flex-wrap">
          <input class="form-control" type="date" id="chart-from" style="width:145px" />
          <span class="text-sm text-3">to</span>
          <input class="form-control" type="date" id="chart-to" style="width:145px" />
          <button class="btn btn-secondary btn-sm" onclick="loadSummary()">Apply</button>
          <button class="btn btn-ghost btn-sm" onclick="resetDateFilter()">Reset</button>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-container" style="height:220px">
          <canvas id="income-expense-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('transactions', this)">All Transactions</button>
      <button class="tab-btn" onclick="switchTab('accounts', this)">Accounts</button>
    </div>

    <!-- Transactions -->
    <div id="tab-transactions">
      <div class="card">
        <div class="card-header">
          <h3 id="tx-title">Transactions</h3>
          <div class="flex gap-2 items-center flex-wrap">
            <select class="form-control" id="tx-type-filter" style="width:120px">
              <option value="">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <input class="form-control" type="date" id="tx-from" style="width:145px" placeholder="From" />
            <input class="form-control" type="date" id="tx-to" style="width:145px" placeholder="To" />
            <button class="btn btn-secondary btn-sm" onclick="applyTxFilter()">Filter</button>
          </div>
        </div>
        <div class="table-wrap" style="border:none;border-radius:0">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Reference</th>
                <th>Account</th>
                <th>Description</th>
                <th>Type</th>
                <th style="text-align:right">Amount</th>
                <th>By</th>
              </tr>
            </thead>
            <tbody id="tx-tbody">
              <tr><td colspan="7" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div style="padding:.75rem 1rem" id="tx-pagination"></div>
      </div>
    </div>

    <!-- Accounts -->
    <div id="tab-accounts" class="hidden">
      <div class="card">
        <div class="card-header"><h3>Chart of Accounts</h3></div>
        <div class="table-wrap" style="border:none;border-radius:0">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Account Name</th>
                <th>Type</th>
                <th>Description</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody">
              <tr><td colspan="5" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="../assets/js/activityLog.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
requireRole('admin', 'manager');
populateSidebarUser();
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size   = 12;
Chart.defaults.color       = '#94A3B8';

let txState = { page: 1, limit: 20, type: '', from: '', to: '' };
let cachedAccounts = [];
let ieChart = null;

// Default date range: current month
const now = new Date();
const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
const today    = now.toISOString().split('T')[0];
document.getElementById('chart-from').value = firstDay;
document.getElementById('chart-to').value   = today;

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-transactions').classList.toggle('hidden', tab !== 'transactions');
  document.getElementById('tab-accounts').classList.toggle('hidden', tab !== 'accounts');
  if (tab === 'accounts') loadAccounts();
}

// ── Summary ───────────────────────────────────────────────────
async function loadSummary() {
  const from = document.getElementById('chart-from').value;
  const to   = document.getElementById('chart-to').value;
  try {
    const q = buildQuery({ from, to });
    const { data } = await api.accounting.summary(q);
    const income  = parseFloat(data.total_income)  || 0;
    const expense = parseFloat(data.total_expense) || 0;
    const profit  = income - expense;

    document.getElementById('acct-summary').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Income</div>
        <div class="stat-value" style="color:var(--green)">${formatCurrency(income)}</div>
        <div class="stat-sub">${from ? from + ' – ' + to : 'All time'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Expenses</div>
        <div class="stat-value" style="color:var(--red)">${formatCurrency(expense)}</div>
        <div class="stat-sub">${from ? from + ' – ' + to : 'All time'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net Profit</div>
        <div class="stat-value" style="color:${profit >= 0 ? 'var(--brand)' : 'var(--red)'}">${formatCurrency(profit)}</div>
        <div class="stat-sub">${profit >= 0 ? 'Profitable period' : 'Net loss'}</div>
      </div>`;

    renderIEChart(income, expense);
  } catch(e) {
    document.getElementById('acct-summary').innerHTML = `<div class="stat-card"><p class="text-sm" style="color:var(--red)">Failed to load summary</p></div>`;
  }
}

function renderIEChart(income, expense) {
  if (ieChart) { ieChart.destroy(); }
  const ctx = document.getElementById('income-expense-chart').getContext('2d');
  ieChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Income', 'Expenses', 'Net Profit'],
      datasets: [{
        data: [income, expense, income - expense],
        backgroundColor: ['rgba(22,163,74,.18)', 'rgba(220,38,38,.18)', 'rgba(37,99,235,.18)'],
        borderColor:     ['#16A34A', '#DC2626', '#2563EB'],
        borderWidth: 2, borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: v => '৳ ' + v.toLocaleString() },
          grid: { color: 'rgba(226,232,240,.6)' },
        },
        x: { grid: { display: false } }
      }
    }
  });
}

function resetDateFilter() {
  document.getElementById('chart-from').value = firstDay;
  document.getElementById('chart-to').value   = today;
  loadSummary();
}

// ── Transactions ──────────────────────────────────────────────
function applyTxFilter() {
  txState.type = document.getElementById('tx-type-filter').value;
  txState.from = document.getElementById('tx-from').value;
  txState.to   = document.getElementById('tx-to').value;
  txState.page = 1;
  loadTransactions();
}

async function loadTransactions() {
  const q = buildQuery({ type: txState.type, from: txState.from, to: txState.to, page: txState.page, limit: txState.limit });
  try {
    const res = await api.accounting.transactions(q);
    renderTransactions(res.data);
    renderPagination(document.getElementById('tx-pagination'), res.total, txState.page, txState.limit,
      p => { txState.page = p; loadTransactions(); });
    document.getElementById('tx-title').textContent = `Transactions (${res.total})`;
  } catch(e) {
    document.getElementById('tx-tbody').innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--red)">Failed to load</td></tr>`;
  }
}

function renderTransactions(rows) {
  const tbody = document.getElementById('tx-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <p>No transactions found</p>
      <button class="btn btn-primary btn-sm" data-role="admin,manager" onclick="openTxModal()">Add Transaction</button>
    </div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(t => `
    <tr>
      <td class="text-sm text-2">${formatDate(t.transaction_date)}</td>
      <td><span class="font-500" style="color:var(--brand)">${t.reference}</span></td>
      <td class="text-sm">${t.account_name}</td>
      <td class="text-sm text-2" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description || '—'}</td>
      <td>${statusBadge(t.type)}</td>
      <td style="text-align:right" class="${t.type === 'income' ? 'tx-amount-in' : 'tx-amount-out'}">${formatCurrency(t.amount)}</td>
      <td class="text-sm text-3">${t.created_by_name}</td>
    </tr>`).join('');
}

// ── Accounts ──────────────────────────────────────────────────
async function loadAccounts() {
  try {
    const { data } = await api.accounting.accounts();
    cachedAccounts = data;
    const tbody = document.getElementById('accounts-tbody');
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No accounts set up</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(a => `
      <tr>
        <td><code style="font-size:.78rem;background:var(--surface-2);padding:.15rem .4rem;border-radius:4px">${a.code}</code></td>
        <td class="font-500">${a.name}</td>
        <td>${statusBadge(a.type)}</td>
        <td class="text-sm text-2">${a.description || '—'}</td>
        <td>${a.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-gray">Inactive</span>'}</td>
      </tr>`).join('');
  } catch(e) {
    document.getElementById('accounts-tbody').innerHTML = `<tr><td colspan="5" style="color:var(--red);text-align:center">Failed to load accounts</td></tr>`;
  }
}

// ── Add transaction modal ─────────────────────────────────────
async function openTxModal() {
  if (!cachedAccounts.length) {
    try { const { data } = await api.accounting.accounts(); cachedAccounts = data; } catch(e) {}
  }
  const today = new Date().toISOString().split('T')[0];
  const html = `
    <div class="modal-header">
      <h2>Add Transaction</h2>
      <button class="btn-icon" onclick="closeModal()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Type *</label>
          <select class="form-control" id="tx-type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Account *</label>
          <select class="form-control" id="tx-account">
            <option value="">Select account…</option>
            ${cachedAccounts.map(a => `<option value="${a.id}">${a.code} — ${a.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount *</label>
          <input class="form-control" id="tx-amount" type="number" step="0.01" min="0.01" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input class="form-control" id="tx-date" type="date" value="${today}" />
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Reference *</label>
          <input class="form-control" id="tx-ref" placeholder="e.g. RENT-JUN-2025, UTIL-001…" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="tx-desc" placeholder="Details about this transaction…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-tx-btn" onclick="saveTx()">Save Transaction</button>
    </div>`;
  openModal(html, { large: true });
}

async function saveTx() {
  const btn = document.getElementById('save-tx-btn');
  const type         = document.getElementById('tx-type').value;
  const account_id   = document.getElementById('tx-account').value;
  const amount       = document.getElementById('tx-amount').value;
  const reference    = document.getElementById('tx-ref').value.trim();
  const transaction_date = document.getElementById('tx-date').value;
  const description  = document.getElementById('tx-desc').value;

  if (!account_id)   { toast('Select an account', 'error'); return; }
  if (!amount || parseFloat(amount) <= 0) { toast('Enter a valid amount', 'error'); return; }
  if (!reference)    { toast('Reference is required', 'error'); return; }
  if (!transaction_date) { toast('Date is required', 'error'); return; }

  btnLoading(btn, true);
  try {
    await api.accounting.createTx({ type, account_id, amount: parseFloat(amount), reference, description, transaction_date });
    toast('Transaction saved', 'success');
    closeModal();
    loadTransactions(); loadSummary();
  } catch(e) { toast(e.message, 'error'); btnLoading(btn, false); }
}

// ── Filters for TX table ──────────────────────────────────────
document.getElementById('tx-type-filter').addEventListener('change', applyTxFilter);

// ── Init ──────────────────────────────────────────────────────
loadSummary();
loadTransactions();
</script>
</body>
</html>
