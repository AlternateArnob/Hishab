<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory — Hishab ERP</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
</head>
<body>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">H</div>
      <div><div class="logo-text">Hishab</div><div class="logo-sub">ERP Platform</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="dashboard.html"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="nav-section-label">Modules</div>
      <a class="nav-item" href="crm.html"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>CRM</a>
      <a class="nav-item" href="sales.html"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Sales</a>
      <a class="nav-item active" href="inventory.html"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>Inventory</a>
      <a class="nav-item" href="accounting.html" data-role="admin,manager"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Accounting</a>
      <a class="nav-item" href="analytics.html" data-role="admin,manager"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><polyline points="2 20 22 20"/></svg>Analytics</a>
      <a class="nav-item" href="users.html" data-role="admin">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
        Users
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="logout()">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-info"><div class="user-name" id="sidebar-user-name">Admin</div><div class="user-role" id="sidebar-user-role">admin</div></div>
        <svg width="14" height="14" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" viewBox="0 0 24 24" style="margin-left:auto;flex-shrink:0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <header class="topbar">
    <button class="hamburger" onclick="openSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div><div class="topbar-title">Inventory</div><div class="topbar-breadcrumb">Products &amp; Stock</div></div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="openAdjustModal()" data-role="admin,manager">Adjust Stock</button>
      <button class="btn btn-primary btn-sm" onclick="openProductModal()" data-role="admin,manager">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Product
      </button>
    </div>
  </header>

  <main class="main-content">

    <div class="stat-grid" id="inv-stats">
      <div class="stat-card"><div class="spinner"></div></div>
      <div class="stat-card"><div class="spinner"></div></div>
      <div class="stat-card"><div class="spinner"></div></div>
      <div class="stat-card"><div class="spinner"></div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 id="table-title">All Products</h3>
        <div class="flex gap-2 items-center">
          <div class="search-bar">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="form-control" type="text" id="search-input" placeholder="Search products…" style="width:200px" />
          </div>
          <select class="form-control" id="cat-filter" style="width:140px">
            <option value="">All Categories</option>
          </select>
          <label style="display:flex;align-items:center;gap:.4rem;font-size:.825rem;color:var(--text-2);cursor:pointer;white-space:nowrap">
            <input type="checkbox" id="low-stock-filter" /> Low stock only
          </label>
        </div>
      </div>
      <div class="table-wrap" style="border:none;border-radius:0">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>SKU</th>
              <th>Category</th>
              <th>Cost Price</th>
              <th>Selling Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="inv-tbody">
            <tr><td colspan="8" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="padding:.75rem 1rem" id="inv-pagination"></div>
    </div>

  </main>
</div>

<!-- Detail panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-panel-header">
    <h3 id="detail-name">Product</h3>
    <button class="btn-icon" onclick="closeDetail()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="detail-panel-body" id="detail-body"></div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
requireAuth();
populateSidebarUser();
  // Apply staff read-only banner
  if (isStaff()) showStaffReadOnlyBanner('You have read-only access. Adding, editing products and adjusting stock require manager or admin access.');
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

let state = { page: 1, limit: 15, search: '', category_id: '', low_stock: false };
let categories = [];

async function loadStats() {
  try {
    const { data } = await api.inventory.stats();
    document.getElementById('inv-stats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value">${data.total_products || 0}</div></div>
      <div class="stat-card"><div class="stat-label">Total Stock Units</div><div class="stat-value">${parseFloat(data.total_stock||0).toFixed(0)}</div></div>
      <div class="stat-card"><div class="stat-label">Stock Value</div><div class="stat-value">${formatCurrency(data.stock_value||0)}</div></div>
      <div class="stat-card"><div class="stat-label">Low Stock Alerts</div><div class="stat-value" style="color:var(--red)">${data.low_stock_count||0}</div></div>`;
  } catch(e) {}
}

async function loadCategories() {
  try {
    const { data } = await api.inventory.categories();
    categories = data;
    const sel = document.getElementById('cat-filter');
    data.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o); });
  } catch(e) {}
}

async function loadProducts() {
  const q = buildQuery({ search: state.search, category_id: state.category_id, low_stock: state.low_stock || '', page: state.page, limit: state.limit });
  try {
    const res = await api.inventory.list(q);
    renderTable(res.data);
    renderPagination(document.getElementById('inv-pagination'), res.total, state.page, state.limit, p => { state.page = p; loadProducts(); });
    document.getElementById('table-title').textContent = `All Products (${res.total})`;
  } catch(e) {
    document.getElementById('inv-tbody').innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--red)">Failed to load</td></tr>`;
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('inv-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><p>No products found</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(p => {
    const pct = p.min_stock_qty > 0 ? Math.min(100, (p.stock_qty / (p.min_stock_qty * 3)) * 100) : 100;
    const barClass = p.stock_qty <= 0 ? 'empty' : p.stock_qty <= p.min_stock_qty ? 'low' : '';
    return `
    <tr style="cursor:pointer" onclick="openDetail(${p.id})">
      <td><div class="font-500">${p.name}</div><div class="text-xs text-3">${p.unit}</div></td>
      <td><code style="font-size:.78rem;color:var(--text-2)">${p.sku}</code></td>
      <td class="text-sm">${p.category_name || '—'}</td>
      <td class="text-sm">${formatCurrency(p.cost_price)}</td>
      <td class="text-sm font-500">${formatCurrency(p.selling_price)}</td>
      <td>
        <div class="flex items-center gap-2">
          <div class="stock-bar"><div class="stock-bar-fill ${barClass}" style="width:${pct}%"></div></div>
          <span class="text-sm ${p.stock_qty <= p.min_stock_qty ? 'font-600' : ''}" style="${p.stock_qty <= 0 ? 'color:var(--red)' : p.stock_qty <= p.min_stock_qty ? 'color:var(--yellow)' : ''}">${p.stock_qty}</span>
        </div>
      </td>
      <td>${p.stock_qty <= 0 ? '<span class="badge badge-red">Out of stock</span>' : p.stock_qty <= p.min_stock_qty ? '<span class="badge badge-yellow">Low stock</span>' : '<span class="badge badge-green">In stock</span>'}</td>
      <td>
        <div class="flex gap-1">
          <button class="btn-icon" title="Edit" data-role="admin,manager" data-role="admin,manager" onclick="event.stopPropagation();openProductModal(${p.id})">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-sm" title="Adjust stock" onclick="event.stopPropagation();openAdjustModal(${p.id},'${p.name.replace(/'/g,"\\'")}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function openDetail(id) {
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-body').innerHTML = `<div class="spinner"></div>`;
  try {
    const { data, movements } = await api.inventory.get(id);
    document.getElementById('detail-name').textContent = data.name;
    document.getElementById('detail-body').innerHTML = `
      <div class="flex flex-col gap-3">
        <div class="flex gap-3">
          <div style="flex:1;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius-sm);padding:.75rem;text-align:center">
            <div class="text-xs text-3 font-600" style="text-transform:uppercase">Stock</div>
            <div style="font-size:1.5rem;font-weight:600;color:var(--green)">${data.stock_qty}</div>
            <div class="text-xs text-3">${data.unit}</div>
          </div>
          <div style="flex:1;background:var(--brand-light);border:1px solid var(--brand-muted);border-radius:var(--radius-sm);padding:.75rem;text-align:center">
            <div class="text-xs text-3 font-600" style="text-transform:uppercase">Value</div>
            <div style="font-size:1.1rem;font-weight:600;color:var(--brand)">${formatCurrency(data.stock_qty * data.cost_price)}</div>
            <div class="text-xs text-3">at cost</div>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          ${dfield('SKU', `<code>${data.sku}</code>`)}
          ${dfield('Category', data.category_name || '—')}
          ${dfield('Cost Price', formatCurrency(data.cost_price))}
          ${dfield('Selling Price', formatCurrency(data.selling_price))}
          ${dfield('Min Stock', data.min_stock_qty + ' ' + data.unit)}
          ${data.description ? dfield('Description', data.description) : ''}
        </div>
      </div>
      <hr class="divider"/>
      <div>
        <h3 style="font-size:.9rem;margin-bottom:.75rem">Recent Stock Movements</h3>
        ${movements.length ? movements.slice(0,10).map(m => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">
            <div>
              <div class="text-sm font-500">${statusBadge(m.type)} ${m.note || m.reference || ''}</div>
              <div class="text-xs text-3">${m.user_name} · ${formatDate(m.created_at)}</div>
            </div>
            <div class="font-600 ${m.type==='in'?'tx-amount-in':'tx-amount-out'}">${m.type==='in'?'+':''}${m.type==='out'?'-':''}${m.qty}</div>
          </div>`).join('') : `<p class="text-sm text-3">No movements yet</p>`}
      </div>`;
  } catch(e) {
    document.getElementById('detail-body').innerHTML = `<p style="color:var(--red)" class="text-sm">Failed to load</p>`;
  }
}
function dfield(l, v) { return `<div class="flex justify-between items-center" style="font-size:.85rem"><span class="text-3">${l}</span><span class="font-500">${v}</span></div>`; }
function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }

async function openProductModal(id = null) {
  let product = null;
  if (id) { try { const r = await api.inventory.get(id); product = r.data; } catch(e) {} }
  const p = product || {};
  const html = `
    <div class="modal-header">
      <h2>${id ? 'Edit Product' : 'Add Product'}</h2>
      <button class="btn-icon" onclick="closeModal()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Product Name *</label>
          <input class="form-control" id="p-name" value="${p.name||''}" placeholder="Product name" />
        </div>
        <div class="form-group">
          <label class="form-label">SKU *</label>
          <input class="form-control" id="p-sku" value="${p.sku||''}" placeholder="PROD-001" />
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-control" id="p-cat">
            <option value="">— None —</option>
            ${categories.map(c => `<option value="${c.id}" ${p.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Cost Price</label>
          <input class="form-control" id="p-cost" type="number" step="0.01" value="${p.cost_price||0}" />
        </div>
        <div class="form-group">
          <label class="form-label">Selling Price</label>
          <input class="form-control" id="p-sell" type="number" step="0.01" value="${p.selling_price||0}" />
        </div>
        <div class="form-group">
          <label class="form-label">${id ? 'Min Stock Qty' : 'Opening Stock'}</label>
          <input class="form-control" id="p-stock" type="number" step="0.01" value="${id ? p.min_stock_qty : 0}" />
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <input class="form-control" id="p-unit" value="${p.unit||'pcs'}" placeholder="pcs / kg / litre" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="p-desc">${p.description||''}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-product-btn" onclick="saveProduct(${id||'null'})">${id?'Save Changes':'Add Product'}</button>
    </div>`;
  openModal(html, { large: true });
}

async function saveProduct(id) {
  if (!isAdminOrManager()) { toast('Only managers and admins can save products', 'error'); return; }
  const btn = document.getElementById('save-product-btn');
  const name = document.getElementById('p-name').value.trim();
  const sku  = document.getElementById('p-sku').value.trim();
  if (!name || !sku) { toast('Name and SKU required', 'error'); return; }
  const data = {
    name, sku,
    category_id: document.getElementById('p-cat').value || null,
    cost_price: document.getElementById('p-cost').value,
    selling_price: document.getElementById('p-sell').value,
    [id ? 'min_stock_qty' : 'stock_qty']: document.getElementById('p-stock').value,
    unit: document.getElementById('p-unit').value,
    description: document.getElementById('p-desc').value,
  };
  btnLoading(btn, true);
  try {
    if (id) { await api.inventory.update(id, data); toast('Product updated', 'success'); }
    else    { await api.inventory.create(data);     toast('Product added', 'success'); }
    closeModal(); loadProducts(); loadStats();
  } catch(e) { toast(e.message, 'error'); btnLoading(btn, false); }
}

function openAdjustModal(id = null, name = '') {
  const html = `
    <div class="modal-header">
      <h2>Adjust Stock</h2>
      <button class="btn-icon" onclick="closeModal()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      ${!id ? `<div class="form-group"><label class="form-label">Product</label><select class="form-control" id="adj-product"><option value="">Select product…</option>${document._invProducts?.map(p=>`<option value="${p.id}">${p.name} (${p.stock_qty} ${p.unit})</option>`).join('')||''}</select></div>` : `<p class="font-500" style="margin-bottom:.25rem">${name}</p>`}
      <div class="form-group">
        <label class="form-label">Movement Type</label>
        <select class="form-control" id="adj-type">
          <option value="in">Stock In (add)</option>
          <option value="out">Stock Out (remove)</option>
          <option value="adjustment">Adjustment (set to)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quantity *</label>
        <input class="form-control" id="adj-qty" type="number" step="0.01" min="0" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <input class="form-control" id="adj-note" placeholder="Reason for adjustment…" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="adj-btn" onclick="saveAdjust(${id||'null'})">Apply</button>
    </div>`;
  openModal(html);
}

async function saveAdjust(id) {
  const btn = document.getElementById('adj-btn');
  const productId = id || document.getElementById('adj-product')?.value;
  if (!productId) { toast('Select a product', 'error'); return; }
  const qty  = document.getElementById('adj-qty').value;
  if (!qty || qty <= 0) { toast('Enter a valid quantity', 'error'); return; }
  const data = { type: document.getElementById('adj-type').value, qty, note: document.getElementById('adj-note').value };
  btnLoading(btn, true);
  try {
    const r = await api.inventory.adjust(productId, data);
    toast(`Stock adjusted. New qty: ${r.new_qty}`, 'success');
    closeModal(); loadProducts(); loadStats();
  } catch(e) { toast(e.message, 'error'); btnLoading(btn, false); }
}

document.getElementById('search-input').addEventListener('input', debounce(e => { state.search = e.target.value; state.page = 1; loadProducts(); }));
document.getElementById('cat-filter').addEventListener('change', e => { state.category_id = e.target.value; state.page = 1; loadProducts(); });
document.getElementById('low-stock-filter').addEventListener('change', e => { state.low_stock = e.target.checked; state.page = 1; loadProducts(); });

loadStats();
loadCategories();
loadProducts();
</script>
</body>
</html>
